openapi: 3.1.0
info:
  title: Stocky API
  version: 0.1.0
  description: API REST do sistema Stocky.
servers:
  - url: http://localhost:3000
    description: Ambiente local do back-end
tags:
  - name: Auth
    description: Autenticacao de usuarios.
  - name: Usuarios
    description: Gerenciamento de usuarios.
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Autentica o usuario por CPF ou e-mail e retorna o cookie de autenticacao.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              loginPorEmail:
                summary: Login por e-mail
                value:
                  login: maria.silva@example.com
                  password: senha-segura
              loginPorCpf:
                summary: Login por CPF
                value:
                  login: "123.456.789-01"
                  password: senha-segura
      responses:
        "200":
          description: Usuario autenticado.
          headers:
            Set-Cookie:
              description: Cookie httpOnly de autenticacao com duracao de 8 horas.
              schema:
                type: string
                example: token=abc123; Max-Age=28800; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                usuarioAutenticado:
                  value:
                    usuario:
                      id: 1
                      nome: Maria Silva
                      cpf: "12345678901"
                      email: maria.silva@example.com
                      ativo: true
        "400":
          description: Campos obrigatorios ausentes ou dados invalidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposObrigatoriosAusentes:
                  value:
                    error: Campos obrigatórios ausentes
                    details:
                      fields:
                        - login
                        - password
        "401":
          description: Credenciais invalidas ou login ambiguo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                naoAutorizado:
                  value:
                    error: Não autorizado
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Encerra a autenticacao no navegador removendo o cookie de autenticacao.
      operationId: logout
      responses:
        "204":
          description: Logout realizado.
          headers:
            Set-Cookie:
              description: Cookie de autenticacao expirado.
              schema:
                type: string
                example: token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; HttpOnly; SameSite=Lax
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
  /usuarios:
    post:
      tags:
        - Usuarios
      security:
        - bearerAuth: []
        - cookieAuth: []
      summary: Criar usuario
      description: Cria um novo usuario e retorna os dados publicos do cadastro.
      operationId: criarUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarUsuarioRequest"
            examples:
              usuarioAtivo:
                summary: Usuario ativo
                value:
                  nome: Maria Silva
                  cpf: "12345678901"
                  email: maria.silva@example.com
                  senha: senha-segura
                  ativo: true
      responses:
        "201":
          description: Usuario criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"
              examples:
                usuarioCriado:
                  value:
                    id: 1
                    nome: Maria Silva
                    cpf: "12345678901"
                    email: maria.silva@example.com
                    ativo: true
        "400":
          description: Campos obrigatorios ausentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposObrigatoriosAusentes:
                  value:
                    error: Campos obrigatorios ausentes
                    details:
                      fields:
                        - nome
                        - cpf
                cpfInvalido:
                  value:
                    error: CPF inválido
                    details:
                      fields:
                        - cpf
                emailInvalido:
                  value:
                    error: E-mail inválido
                    details:
                      fields:
                        - email
        "409":
          description: Usuario ja cadastrado com o mesmo CPF ou e-mail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                usuarioJaCadastrado:
                  value:
                    error: Usuário já cadastrado
                    details:
                      fields:
                        - cpf
                        - email
        "401":
          description: Autenticacao nao realizada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                autenticacaoNaoRealizada:
                  value:
                    error: Autenticação não realizada
        "500":
          description: Erro inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                erroInterno:
                  value:
                    error: Erro interno do servidor
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token informado no header Authorization.
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Token informado no cookie httpOnly `token`.
  schemas:
    LoginRequest:
      type: object
      additionalProperties: true
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: CPF ou e-mail do usuario. Quando CPF, pode ser enviado formatado.
          example: maria.silva@example.com
        password:
          type: string
          format: password
          example: senha-segura
    LoginResponse:
      type: object
      required:
        - usuario
      properties:
        usuario:
          $ref: "#/components/schemas/Usuario"
    CriarUsuarioRequest:
      type: object
      additionalProperties: true
      required:
        - nome
        - cpf
        - email
        - senha
      properties:
        nome:
          type: string
          example: Maria Silva
        cpf:
          type: string
          description: CPF pode ser enviado formatado, mas sera salvo apenas com numeros.
          minLength: 11
          maxLength: 11
          pattern: "^\\d{11}$"
          example: "12345678901"
        email:
          type: string
          format: email
          example: maria.silva@example.com
        senha:
          type: string
          format: password
          example: senha-segura
        ativo:
          type: boolean
          default: true
          example: true
    Usuario:
      type: object
      required:
        - id
        - nome
        - cpf
        - email
        - ativo
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Maria Silva
        cpf:
          type: string
          minLength: 11
          maxLength: 11
          example: "12345678901"
        email:
          type: string
          format: email
          example: maria.silva@example.com
        ativo:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Campos obrigatorios ausentes
        details:
          type: object
          additionalProperties: true
